# Upptime config — iPLAYCAFE (.app brand)  →  status.iplaycafe.app
# Copy as `.upptimerc.yml` into `iPLAYCAFE-dev/status-app` (from the upptimejs/upptime template, PUBLIC).
# Schema: https://upptime.js.org/docs/configuration

owner: iPLAYCAFE-dev
repo: status-app

sites:
  # Torrust BitTorrent tracker (Bunny Magic Containers — kept). /health_check returns 200.
  - name: Tracker (Torrust)
    url: https://tracker.iplaycafe.app/health_check
    expectedStatusCodes:
      - 200
    maxResponseTime: 5000
    # The tracker speaks BitTorrent on /announce + /scrape (not browser-HTTP); do NOT monitor those
    # bare (they need query params -> 4xx). /health_check is the canonical liveness signal.

  # lynx / iPLAYCAFE product (InsForge-backed).
  # TODO: set the real product public URL/health endpoint before first run (placeholder below).
  - name: iPLAYCAFE app (lynx)
    url: https://iplaycafe.app/
    expectedStatusCodes:
      - 200
      - 301
      - 302
    maxResponseTime: 5000

status-website:
  cname: status.iplaycafe.app
  name: iPLAYCAFE Status
  introTitle: "**iPLAYCAFE** service status (.app)"
  introMessage: Live status of iPLAYCAFE .app services (tracker + app).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/iPLAYCAFE-dev

assignees:
  - iPLAYCAFE-dev

